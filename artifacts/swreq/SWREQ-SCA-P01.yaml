artifacts:
  - id: SWREQ-SCA-P01
    type: sw-req
    title: "SCA-P01: Invariant holds after init"
    status: approved
    description: >
      After initialization, the absolute command table shall be empty
      with count at zero.
    tags: [stored-command-absolute, invariant, verus]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus proof: new() postcondition establishes inv() and count == 0.
    links:
      - type: derives-from
        target: SYSREQ-SCA-001

  - id: SWREQ-SCA-P02
    type: sw-req
    title: "SCA-P02: Dispatch count bounded by MAX_DISPATCH_PER_TICK"
    status: approved
    description: >
      Each tick shall dispatch at most MAX_DISPATCH_PER_TICK absolute
      commands.
    tags: [stored-command-absolute, bounded, output, verus]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus proof: dispatch ensures count <= MAX_DISPATCH_PER_TICK.
    links:
      - type: derives-from
        target: SYSREQ-SCA-001

  - id: SWREQ-SCA-P03
    type: sw-req
    title: "SCA-P03: Invariant preserved by add_command"
    status: approved
    description: >
      The add_command operation shall preserve the table invariant.
      Count is bounded by MAX_COMMANDS.
    tags: [stored-command-absolute, invariant, bounded, verus]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus proof: add_command requires inv(), ensures inv() and count bounded.
    links:
      - type: derives-from
        target: SYSREQ-SCA-001

  - id: SWREQ-SCA-P04
    type: sw-req
    title: "SCA-P04: Dispatched commands are never re-dispatched"
    status: approved
    description: >
      Once an absolute command has been dispatched, it shall not be
      dispatched again in subsequent ticks.
    tags: [stored-command-absolute, idempotent, verus]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus proof: dispatched flag prevents re-dispatch.
    links:
      - type: derives-from
        target: SYSREQ-SCA-001
